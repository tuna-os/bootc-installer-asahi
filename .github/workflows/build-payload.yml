name: Build asahi-installer payload

# D0 of docs/DESIGN.md: package a bootc aarch64 image as an asahi-installer
# payload (esp/ + root.img zip + installer_data.json). Dispatch against any
# asahi-capable image; artifact-only until R2 credentials are wired.

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Asahi-capable bootc image ref"
        default: "ghcr.io/tuna-os/bonito:gnome-asahi-testing"
        type: string
      name:
        description: "Payload name"
        default: "tunaos-bootstrap"
        type: string
      root_size_gb:
        description: "Root partition size (GB) for the loopback install"
        default: "16"
        type: string

permissions:
  contents: read
  packages: read

jobs:
  payload:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GH_TOKEN" | sudo podman login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Pull image
        run: sudo podman pull "${{ inputs.image }}"

      - name: Free up disk space
        # Desktop images need a 16G loopback disk + pulled layers + the
        # zipped payload; stock runners don't have the headroom.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Build payload
        run: sudo -E ./scripts/make-payload.sh "${{ inputs.image }}" "${{ inputs.name }}" "${{ inputs.root_size_gb }}"

      - name: "Test: payload structure, boot chain, rootfs, installer_data"
        run: sudo ./scripts/test-payload.sh "out/${{ inputs.name }}.zip" out/installer_data.json

      - name: Install qemu + U-Boot firmware
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-arm qemu-utils u-boot-qemu ipxe-qemu parted dosfstools

      - name: "Test: boot the reconstructed install (U-Boot EFI chain)"
        run: sudo ./scripts/test-boot-payload.sh "out/${{ inputs.name }}.zip"

      - name: Upload boot serial log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: payload-boot-serial-${{ github.run_id }}
          path: serial-payload-boot.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload payload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.name }}-payload
          path: out/
          retention-days: 14

      # TODO(R2): rclone upload to download.tunaos.org/asahi once secrets are
      # set (same pattern as the tunaOS ISO pipelines), then point a branded
      # `curl | sh` bootstrap at the hosted installer_data.json.
